<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Daily Deed Tracker</title>
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
				background: #0b1120;
				color: #e2e8f0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			}
			.wrap {
				min-height: 100dvh;
				display: grid;
				place-items: center;
				text-align: center;
				padding: 2rem;
				padding-top: env(safe-area-inset-top);
				padding-bottom: env(safe-area-inset-bottom);
			}
			h1 {
				font-size: 1.25rem;
				margin: 0 0 0.5rem;
			}
			p {
				margin: 0;
				color: #94a3b8;
				font-size: 0.95rem;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<div>
				<h1>No connection</h1>
				<p>Daily Deed Tracker needs internet.<br />Reconnect and reopen the app.</p>
			</div>
		</div>
	</body>
</html>
