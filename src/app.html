<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0f766e" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="DailyTracker" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<title>Daily Tracker</title>
		<script>
			// Apply cached theme before first paint to avoid a flash of the default.
			try {
				var t = localStorage.getItem('theme');
				if (t && /^[a-z-]+$/.test(t)) document.documentElement.dataset.theme = t;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
	
</html>
